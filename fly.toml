# Fly.io configuration — Guzman Motors Backend
# Docs: https://fly.io/docs/reference/configuration/

app = "gm-back-v2"
primary_region = "gru"  # São Paulo — más cercano a Argentina

[build]

[env]
  NODE_ENV = "production"
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
